name: food_cart_billing
description: Blinkit-inspired premium billing & POS app for food carts
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.18.1
  share_plus: ^7.2.1
  google_fonts: ^6.1.0
  flutter_slidable: ^3.0.1
  flutter_staggered_animations: ^1.1.1
  uuid: ^4.3.3
  path_provider: ^2.1.2
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  lottie: ^3.1.0
  fl_chart: ^0.66.2
  url_launcher: ^6.2.4
  flutter_blue_plus: ^1.31.5
  esc_pos_utils: ^1.1.0
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  hive_generator: ^1.1.3

flutter:
  uses-material-design: true
  assets:
    - assets/vectors/
    - assets/animations/