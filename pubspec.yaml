name: food_cart_billing
description: Offline billing app for food cart / small eatery
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.18.1
  pdf: ^3.10.7
  printing: ^5.11.1
  share_plus: ^7.2.1
  google_fonts: ^6.1.0
  flutter_staggered_animations: ^1.1.1
  uuid: ^4.3.3
  path_provider: ^2.1.2
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true